<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Warm paper background -->
  <rect width="32" height="32" rx="6" fill="#FAF8F5"/>
  <rect width="32" height="32" rx="6" fill="#F5F0EB" opacity="0.5"/>

  <!-- Ruled lines -->
  <line x1="4" y1="10" x2="28" y2="10" stroke="#E7E5E4" stroke-width="0.5"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#E7E5E4" stroke-width="0.5"/>
  <line x1="4" y1="22" x2="28" y2="22" stroke="#E7E5E4" stroke-width="0.5"/>

  <!-- Left margin line -->
  <line x1="8" y1="4" x2="8" y2="28" stroke="#F5D5D5" stroke-width="0.75"/>

  <!-- "FP" letters in handwritten style -->
  <text x="11" y="24" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2D2A26" letter-spacing="-1">FP</text>

  <!-- Subtle border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#D6D3D1" stroke-width="0.5"/>
</svg>
